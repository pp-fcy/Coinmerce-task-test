# Golden Path — CI/CD Pipeline
#
# Flow (on push to main):
#   1. pre-commit  — lint, kubeconform, gitleaks, ruff
#   2. build       — build once, Trivy scan, and (main only) push to GHCR
#   3. deploy      — yq-patch deployment.yaml + git commit → ArgoCD auto-syncs [main only]
#
# Required GitHub Secrets:
#   GH_PAT  — (optional) GitHub Personal Access Token with repo write scope.
#             If not set, we fall back to GITHUB_TOKEN (requires contents: write).

name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  # ── 1. Lint & Validate ──────────────────────────────────────────────────────
  pre-commit:
    name: Lint & Validate
    runs-on: ubuntu-latest
    # Skip when the manifest-update bot commits back to main (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure

  # ── 2. Build & Security Scan ────────────────────────────────────────────────
  build:
    name: Build, Scan & (main) Push
    runs-on: ubuntu-latest
    needs: pre-commit
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image once (export to tar)
        uses: docker/build-push-action@v6
        with:
          context: app/
          push: false
          tags: fincore-hello:scan
          outputs: type=docker,dest=/tmp/fincore-hello.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          input: /tmp/fincore-hello.tar
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Log in to GHCR (main only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load & push image to GHCR (main only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker load -i /tmp/fincore-hello.tar
          docker tag fincore-hello:scan ghcr.io/pp-fcy/fincore-hello:sha-${{ github.sha }}
          docker tag fincore-hello:scan ghcr.io/pp-fcy/fincore-hello:latest
          docker push ghcr.io/pp-fcy/fincore-hello:sha-${{ github.sha }}
          docker push ghcr.io/pp-fcy/fincore-hello:latest

  # ── 3. QA — Smoke & Behaviour Tests ────────────────────────────────────────
  test:
    name: QA Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Load image from tar
        run: docker load -i /tmp/fincore-hello.tar

      - name: Start container
        run: |
          docker run -d --name fincore-test -p 8080:8080 fincore-hello:scan
          # Wait for the server to be ready
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/healthz && break || sleep 1
          done

      - name: Smoke test — root returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Smoke test — /healthz returns 'ok'
        run: |
          BODY=$(curl -sf http://localhost:8080/healthz)
          [ "$BODY" = "ok" ] || (echo "Expected 'ok', got '$BODY'" && exit 1)

      - name: Smoke test — custom message via env var
        run: |
          docker run --rm -e HELLO_MESSAGE="FinCore IDP" -p 8081:8080 fincore-hello:scan &
          sleep 2
          BODY=$(curl -sf http://localhost:8081/)
          [ "$BODY" = "FinCore IDP" ] || (echo "Expected 'FinCore IDP', got '$BODY'" && exit 1)

      - name: Teardown
        if: always()
        run: docker rm -f fincore-test || true

  # ── 4. Update Manifest → ArgoCD auto-syncs ─────────────────────────────────
  deploy:
    name: Update Manifest & Trigger ArgoCD
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          # Prefer PAT (if set), otherwise use GITHUB_TOKEN.
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Patch image tag in deployment manifest
        run: |
          yq e \
            '.spec.template.spec.containers[0].image = "ghcr.io/pp-fcy/fincore-hello:sha-${{ github.sha }}"' \
            -i k8s/webapp/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/webapp/deployment.yaml
          # Only commit if the manifest actually changed (idempotent)
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: deploy fincore-hello sha-${{ github.sha }} [skip ci]"
          git push
