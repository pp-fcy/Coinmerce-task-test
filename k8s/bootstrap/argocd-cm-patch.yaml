apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  # Teach ArgoCD's schema validator about .status.terminatingReplicas which was
  # added to HorizontalPodAutoscaler in k8s 1.29 but is not yet in ArgoCD's
  # bundled OpenAPI schema. Without this, ArgoCD crashes at diff calculation
  # with "field not declared in schema" before ignoreDifferences can apply.
  resource.customizations.ignoreDifferences.autoscaling_HorizontalPodAutoscaler: |
    jqPathExpressions:
    - '.status.terminatingReplicas'
